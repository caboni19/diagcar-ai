<svg xmlns="http://www.w3.org/2000/svg" width="180" height="180" viewBox="0 0 180 180" role="img" aria-label="Audi emblem">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff7da"/>
      <stop offset="0.5" stop-color="#f4b400"/>
      <stop offset="1" stop-color="#9a6a00"/>
